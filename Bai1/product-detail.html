<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <header class="text-white text-center py-4">
        <h1>Thông Tin Chi Tiết</h1>
    </header>

    <div class="container mt-5">
        <div class="row bg-white p-4 shadow-sm rounded">
            <div class="col-md-6 text-center">
                <img src="images/anh1.jpg" id="detailImg" class="img-fluid rounded border shadow-sm" alt="Sản phẩm"
                    style="max-height: 400px;">
            </div>
            <!-- Cột bên phải: Hiển thị thông tin chi tiết sản phẩm và đường dẫn Breadcrumb -->
            <div class="col-md-6">
                <!-- Thanh định hướng (Breadcrumb) giúp người dùng biết vị trí hiện tại của trang -->
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Sản phẩm</li>
                    </ol>
                </nav>
                <h2 class="fw-bold">Sản Phẩm Cao Cấp</h2>
                <h3 class="text-danger my-3 fw-bold">$100.00</h3>
                <p class="text-muted">Thông tin mô tả chi tiết về sản phẩm sẽ hiển thị tại đây.</p>
                <div class="d-flex gap-3 mt-4">
                    <button class="btn btn-buy btn-lg px-5">Mua Ngay</button>
                    <a href="index.html" class="btn btn-outline-secondary btn-lg">Quay Lại</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 bg-dark text-white text-center">
        <p class="mb-0">&copy; 2026 Coffee Tree.</p>
    </footer>

</body>

</html>
