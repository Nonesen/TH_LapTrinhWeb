<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Bán Hàng - Quản Lý</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="text-white text-center py-4">
        <h1>Trang Web Bán Hàng</h1>
    </header>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">SHOP MỚI</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><button class="btn btn-dark btn-sm me-2" onclick="showAddModal()">+ Thêm Sản Phẩm</button></li>
                    <li class="nav-item"><a class="nav-link active" href="index.html">Trang Chủ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-9">
                <div class="row row-cols-1 row-cols-md-3 g-4" id="productContainer">
                    </div>
            </div>

            <div class="col-md-3">
                <div class="sidebar p-3 rounded shadow-sm">
                    <h5 class="fw-bold border-bottom pb-2 mb-3">Kết Nối</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="social-link">Facebook</a></li>
                        <li><a href="#" class="social-link">Instagram</a></li>
                        <li><a href="#" class="social-link">LinkedIn</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Sản Phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editIndex">
                    <div class="mb-3">
                        <label class="form-label">Tên sản phẩm</label>
                        <input type="text" id="pName" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá ($)</label>
                        <input type="number" id="pPrice" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Link ảnh (images/anhX.jpg hoặc URL)</label>
                        <input type="text" id="pImg" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">Lưu Thay Đổi</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 bg-dark text-white text-center">
        <p class="mb-0 small">&copy; 2026 Bản quyền thuộc về Shop Mới.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Dữ liệu mẫu
        let products = JSON.parse(localStorage.getItem('products')) || [
            { name: "Sản Phẩm 1", price: 100, img: "images/anh1.jpg", desc: "Mô tả sản phẩm 1" },
            { name: "Sản Phẩm 2", price: 150, img: "images/anh2.jpg", desc: "Mô tả sản phẩm 2" },
            { name: "Sản Phẩm 3", price: 120, img: "images/anh3.jpg", desc: "Mô tả sản phẩm 3" },
            { name: "Sản Phẩm 4", price: 80, img: "images/anh4.jpg", desc: "Mô tả sản phẩm 4" },
            { name: "Sản Phẩm 5", price: 200, img: "images/anh5.jpg", desc: "Mô tả sản phẩm 5" }
        ];

        const modal = new bootstrap.Modal(document.getElementById('productModal'));

        function renderProducts() {
            const container = document.getElementById('productContainer');
            container.innerHTML = products.map((p, i) => `
                <div class="col">
                    <div class="card h-100 product-card shadow-sm">
                        <a href="product-detail.html"><img src="${p.img}" class="card-img-top" alt="${p.name}"></a>
                        <div class="card-body text-center">
                            <h5 class="card-title fw-bold">${p.name}</h5>
                            <p class="fw-bold text-danger fs-5">Giá: $${p.price}</p>
                            <div class="d-grid gap-2">
                                <a href="product-detail.html" class="btn btn-custom btn-sm">Xem Chi Tiết</a>
                                <button class="btn btn-buy btn-sm">Mua Ngay</button>
                                <div class="d-flex gap-1 mt-2">
                                    <button class="btn btn-warning btn-sm w-50" onclick="editProduct(${i})">Sửa</button>
                                    <button class="btn btn-danger btn-sm w-50" onclick="deleteProduct(${i})">Xóa</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            localStorage.setItem('products', JSON.stringify(products));
        }

        function showAddModal() {
            document.getElementById('modalTitle').innerText = "Thêm Sản Phẩm";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pImg').value = "images/anh1.jpg";
            modal.show();
        }

        function saveProduct() {
            const index = document.getElementById('editIndex').value;
            const newProduct = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                img: document.getElementById('pImg').value,
                desc: "Mô tả mới"
            };

            if (index === "-1") products.push(newProduct);
            else products[index] = newProduct;

            renderProducts();
            modal.hide();
        }

        function editProduct(index) {
            document.getElementById('modalTitle').innerText = "Sửa Sản Phẩm";
            document.getElementById('editIndex').value = index;
            document.getElementById('pName').value = products[index].name;
            document.getElementById('pPrice').value = products[index].price;
            document.getElementById('pImg').value = products[index].img;
            modal.show();
        }

        function deleteProduct(index) {
            if(confirm("Bạn có chắc chắn muốn xóa?")) {
                products.splice(index, 1);
                renderProducts();
            }
        }

        renderProducts();
    </script>
</body>
</html>
